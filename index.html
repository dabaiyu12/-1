<body>
  <!-- 头部导航 -->
  <header>
    <div class="logo">
      <img src="images/LOGO.PNG" alt="小兔鲜儿">
    </div>
    <nav>
      <ul>
        <li><a href="#">首页</a></li>
        <li><a href="#">生鲜</a></li>
        <li><a href="#">洗护</a></li>
        <li><a href="#">孕婴</a></li>

  <!-- 轮播图 -->
  <div class="banner">
    <img src="images/banner_1.png" alt="轮播图">

  <!-- 分类区 -->

    </div>
    <div class="category-item">

    </div>
    <div class="category-item">
      <img src="images/kitchen.png" alt="餐厨用具">
      <h3>餐厨用具</h3>
    </div>
  </section>

  <!-- 新鲜好物区 -->
  <section class="goods">
    <h2>新鲜好物</h2>
    <div class="goods-list">
      <div class="goods-item">
        <img src="images/MS1.JPEG" alt="新鲜好物1">

      </div>
      <div class="goods-item">
        <img src="images/MS2.JPEG" alt="新鲜好物2">

  <footer>
